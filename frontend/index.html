<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OlegVPN — Твой уютный VPN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Заголовок -->
        <div class="header">
            <div class="logo">🛡️</div>
            <h1>OlegVPN</h1>
            <p class="subtitle">Твой уютный и безопасный интернет</p>
        </div>

        <!-- Статус -->
        <div class="status-area">
            <div class="status-indicator" id="statusIndicator"></div>
            <div class="status-text" id="statusText">Не подключен</div>
        </div>

        <!-- Счётчики трафика -->
        <div class="traffic">
            <div class="traffic-item">
                <span class="traffic-icon">⬇️</span>
                <span id="download">0 MB</span>
            </div>
            <div class="traffic-item">
                <span class="traffic-icon">⬆️</span>
                <span id="upload">0 MB</span>
            </div>
        </div>

        <!-- Информация о сервере -->
        <div class="server-info">
            <div class="server-name">🇷🇺 Россия (Москва)</div>
            <div class="server-endpoint">ru.olegvpn.com:51820</div>
            <div class="coming-soon">
                Скоро: 🇰🇿 Казахстан, 🇹🇯 Таджикистан
            </div>
        </div>

        <!-- Кнопка -->
        <button id="connectBtn" class="connect-btn">
            <div class="btn-content">
                <span id="btnIcon">🔓</span>
                <span id="btnText">Подключиться</span>
            </div>
        </button>

        <!-- Таймер -->
        <div class="time" id="connectionTime" style="display:none;">
            <p>Подключены: <span id="timeCounter">00:00:00</span></p>
            <p class="ip-address">IP: <span id="ipAddress">-</span></p>
        </div>

        <!-- Футер -->
        <div class="footer">
            made with ❤️ for Oleg
        </div>
    </div>

    <script src="app.js"></script>
</body>
                                                        </html>
