name: 📱 Build OlegVPN APK

on:
  workflow_dispatch:   # Ручной запуск — жми его!
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 🧹 Remove non-Flutter files (Go stuff)
        run: |
          # Удаляем всё, что относится к Go-бэкенду
          rm -rf main.go frontend *.exe
          # Удаляем возможные остатки старого Flutter-проекта,
          # чтобы flutter create не конфликтовал
          rm -rf .dart_tool android ios linux macos windows web test build pubspec.lock

      - name: 🏗️ Create clean Android project
        run: |
          # flutter create пересоздаст android/ и другие нужные файлы,
          # используя твой pubspec.yaml и lib/main.dart
          flutter create --org com.olegvpn --project-name olegvpn \
            --platforms=android .

      - name: 📚 Get dependencies
        run: flutter pub get

      - name: 🔨 Build APK (debug)
        run: flutter build apk --debug

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OlegVPN-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 🏷️ Create Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
