name: 📱 Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 🔨 Build OlegVPN
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 🔍 Show current directory structure
        run: |
          pwd
          echo "=== FILES IN ROOT ==="
          ls -la
          echo "=== CHECK IF pubspec.yaml EXISTS ==="
          if [ -f "pubspec.yaml" ]; then
            echo "✅ pubspec.yaml found"
            cat pubspec.yaml
          else
            echo "❌ pubspec.yaml NOT FOUND!"
            exit 1
          fi

      - name: 🏗️ Create Flutter project structure
        run: |
          flutter create --org com.olegvpn --project-name olegvpn --platforms=android .
          echo "=== AFTER FLUTTER CREATE ==="
          ls -la

      - name: 📚 Get dependencies
        run: flutter pub get

      - name: 🔨 Build APK (debug)
        run: flutter build apk --debug

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OlegVPN-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 🏷️ Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          name: "OlegVPN ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
