name: 📱 Build OlegVPN APK

on:
  workflow_dispatch:   # Ручной запуск
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: 🔨 Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🎯 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: 🧹 Remove everything except user code (if any)
        run: |
          # Сохраним пользовательский код, если он есть
          if [ -f "lib/main.dart" ]; then
            cp lib/main.dart /tmp/main.dart
          fi
          # Удалим всё, что может мешать
          rm -rf .dart_tool .idea .vscode android ios linux macos web windows test \
                 pubspec.lock build
          # Вернём main.dart обратно
          mkdir -p lib
          if [ -f "/tmp/main.dart" ]; then
            cp /tmp/main.dart lib/main.dart
          fi
          # Если main.dart до сих пор нет — восстановим из репозитория
          if [ ! -f "lib/main.dart" ]; then
            echo "// Placeholder" > lib/main.dart
          fi

      - name: 🏗️ Create fresh Flutter Android project
        run: |
          flutter create --org com.olegvpn --project-name olegvpn \
            --platforms=android .
          # Теперь у нас есть android/ папка, pubspec.yaml и lib/main.dart (перезаписан)
          # Восстановим наш pubspec.yaml, если он был в репо (переопределим)
          if [ -f "pubspec.yaml" ]; then
            cat pubspec.yaml
          fi

      - name: 📚 Get dependencies
        run: flutter pub get

      - name: 🔨 Build APK (debug)
        run: flutter build apk --debug

      - name: 📱 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OlegVPN-APK
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: 🏷️ Create Release (only on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
